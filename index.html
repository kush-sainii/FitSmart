<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HealthBuddy — Chat</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#06b6d4;
      --text:#e6eef6;
      --muted:#9fb0c7;
      --user:#1b3b5a;
      --bot:#0f2335;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:linear-gradient(180deg,#071024 0%, #022033 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .app {
      width:100%;
      max-width:760px;
      height:80vh;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.6);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.03);
    }

    .header {
      padding:18px 20px;
      display:flex;
      gap:12px;
      align-items:center;
      border-bottom:1px solid rgba(255,255,255,0.02);
      background:linear-gradient(0deg, rgba(255,255,255,0.01), transparent);
    }
    .logo {
      width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7dd3fc);display:flex;align-items:center;justify-content:center;font-weight:700;color:#022;letter-spacing:0.6px;
    }
    .title { font-size:16px; font-weight:600; }
    .subtitle { font-size:12px; color:var(--muted); margin-top:2px; }

    .content {
      flex:1;
      padding:18px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .message {
      max-width:78%;
      padding:12px 14px;
      border-radius:12px;
      line-height:1.4;
    }
    .from-user {
      align-self:flex-end;
      background:linear-gradient(180deg,var(--user), #163b5a);
      color:#e6f7ff;
      border-bottom-right-radius:4px;
    }
    .from-bot {
      align-self:flex-start;
      background:linear-gradient(180deg,var(--bot), #05263a);
      color:#dff0ff;
      border-bottom-left-radius:4px;
    }

    .meta {
      font-size:11px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .input-area {
      padding:12px;
      display:flex;
      gap:8px;
      align-items:center;
      border-top:1px solid rgba(255,255,255,0.02);
      background:linear-gradient(180deg, transparent, rgba(0,0,0,0.03));
    }

    .email-input {
      min-width:180px;
      max-width:260px;
      padding:8px 10px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.04);
      background:transparent;
      color:var(--text);
      font-size:14px;
    }

    .text-input {
      flex:1;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background:rgba(255,255,255,0.01);
      color:var(--text);
      font-size:14px;
    }

    .send-btn {
      padding:10px 14px;
      border-radius:10px;
      border:none;
      background:var(--accent);
      color:#022;
      font-weight:700;
      cursor:pointer;
    }

    .typing {
      font-size:13px;color:var(--muted);margin-left:6px;
    }

    .small {
      font-size:12px;color:var(--muted)
    }

    @media (max-width:480px){
      .app{height:92vh}
      .email-input{display:none}
    }
  </style>
</head>
<body>
  <div class="app" role="application">
    <div class="header">
      <div class="logo">HB</div>
      <div>
        <div class="title">HealthBuddy</div>
        <div class="subtitle">Friendly health assistant — prototype</div>
      </div>
      <div style="margin-left:auto" class="small">Backend: POST /chat</div>
    </div>

    <div id="content" class="content" aria-live="polite"></div>

    <div class="input-area">
      <input id="email" class="email-input" type="email" placeholder="your.email@example.com" value="siddhant.kochhar1@gmail.com" />
      <input id="message" class="text-input" type="text" placeholder="Type your message and press Enter" />
      <button id="send" class="send-btn">Send</button>
    </div>
  </div>

  <script>
    // Config: change baseURL if your backend runs elsewhere
    const baseURL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';
    const chatEndpoint = baseURL + '/chat';

    const content = document.getElementById('content');
    const emailInput = document.getElementById('email');
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('send');

    function appendMessage({who, text, meta}) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + (who === 'user' ? 'from-user' : 'from-bot');
      if (meta) {
        const m = document.createElement('div');
        m.className = 'meta';
        m.textContent = meta;
        wrapper.appendChild(m);
      }
      const t = document.createElement('div');
      t.textContent = text;
      wrapper.appendChild(t);
      content.appendChild(wrapper);
      // keep scroll bottom
      content.scrollTop = content.scrollHeight;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.id = 'typing-indicator';
      el.className = 'message from-bot';
      el.innerHTML = '<div class="meta">HealthBuddy</div><div class="typing">HealthBuddy is typing…</div>';
      content.appendChild(el);
      content.scrollTop = content.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const email = emailInput.value.trim();
      const msg = messageInput.value.trim();
      if (!email) {
        alert('Please enter your email (used to fetch profile from sheet).');
        return;
      }
      if (!msg) return;

      appendMessage({who:'user', text: msg, meta: email});
      messageInput.value = '';
      showTyping();

      try {
        const resp = await fetch(chatEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, message: msg })
        });

        removeTyping();

        if (!resp.ok) {
          const err = await resp.json().catch(()=>({detail:'Unknown error'}));
          appendMessage({who:'bot', text: 'Error: ' + (err.detail || JSON.stringify(err)), meta: 'HealthBuddy'});
          return;
        }

        const data = await resp.json();
        appendMessage({who:'bot', text: data.reply || '[no reply]', meta: 'HealthBuddy'});
      } catch (e) {
        removeTyping();
        appendMessage({who:'bot', text: 'Network error: ' + e.message, meta: 'HealthBuddy'});
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', function(e){
      if (e.key === 'Enter') sendMessage();
    });

    // Optional: initial greeting when page loads
    (function initialGreeting(){
      const email = emailInput.value.trim();
      appendMessage({who:'bot', text: 'Hello! Enter your message to start. Make sure your email matches the Google Sheet row.', meta: 'HealthBuddy'});
    })();
  </script>
</body>
</html>
